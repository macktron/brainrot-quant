name: Semantic Trading — Daily Pipeline

on:
  schedule:
    # LIVE trading: runs twice daily at 08:00 and 20:00 UTC
    - cron: "0 8 * * *"
    - cron: "0 20 * * *"
  workflow_dispatch:
    inputs:
      trading_mode:
        description: "Choose whether to paper trade or live trade"
        required: true
        default: paper
        type: choice
        options:
          - paper
          - live
      live_confirmation:
        description: "Type TRADE_LIVE to allow a manual live run"
        required: false
        type: string

permissions:
  contents: write

jobs:
  trade:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('pyproject.toml') }}
          restore-keys: ${{ runner.os }}-pip-

      - name: Install dependencies
        run: pip install -e .

      - name: Validate manual live confirmation
        if: github.event_name == 'workflow_dispatch'
        run: |
          if [ "${{ inputs.trading_mode }}" = "live" ] && [ "${{ inputs.live_confirmation }}" != "TRADE_LIVE" ]; then
            echo "Manual live trading requires live_confirmation=TRADE_LIVE"
            exit 1
          fi

      - name: Select trading mode
        run: |
          if [ "${{ github.event_name }}" = "schedule" ]; then
            echo "DRY_RUN=false" >> "$GITHUB_ENV"
            echo "RUN_MODE=live (scheduled)" >> "$GITHUB_ENV"
          elif [ "${{ inputs.trading_mode }}" = "live" ]; then
            echo "DRY_RUN=false" >> "$GITHUB_ENV"
            echo "RUN_MODE=live (manual)" >> "$GITHUB_ENV"
          else
            echo "DRY_RUN=true" >> "$GITHUB_ENV"
            echo "RUN_MODE=paper (manual)" >> "$GITHUB_ENV"
          fi

      - name: Run trading pipeline
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          POLYMARKET_PRIVATE_KEY: ${{ secrets.POLYMARKET_PRIVATE_KEY }}
          POLY_API_KEY: ${{ secrets.POLY_API_KEY }}
          POLY_API_SECRET: ${{ secrets.POLY_API_SECRET }}
          POLY_PASSPHRASE: ${{ secrets.POLY_PASSPHRASE }}
          POLY_FUNDER: ${{ secrets.POLY_FUNDER }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          # Scheduled runs are live. Manual runs follow the selected mode.
          DRY_RUN: ${{ env.DRY_RUN }}
        run: python run_live.py --max-markets 2000

      - name: Commit run history
        if: always()
        run: |
          git config user.name "semantic-trader[bot]"
          git config user.email "bot@semantic-trader"
          git pull --rebase origin main || true
          git add history/
          git diff --cached --quiet || git commit -m "run: $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          git push || true
